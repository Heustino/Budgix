<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="user-overlay">
    <div class="login-box">
        <div class="login-logo">Budgix</div>
        <p class="login-sub">Votre gestionnaire de budget intelligent</p>
        <div class="field">
            <label>Nom complet</label>
            <input type="text" id="user-fullname" placeholder="Ex: Chrys ATEBA" required>
        </div>
        <div class="field">
            <label>Téléphone</label>
            <input type="tel" id="user-phone" placeholder="Ex: 690 634 101" required>
        </div>
        <button class="btn btn-primary" id="start-app" style="margin-top:8px;">
            <i class="fas fa-rocket"></i> Commencer
        </button>
        <p id="login-error" style="color:var(--danger); font-size:0.8rem; margin-top:10px; display:none;">
            Veuillez remplir tous les champs.
        </p>
    </div>
</div>

<!-- ─── TOAST ─── -->
<div id="toast"></div>

<!-- ─── APP ─── -->
<div class="wrapper" id="main-app">

    <!-- Header -->
    <div class="app-header fade-in">
        <div>
            <div class="app-title">Budgix</div>
            <div style="font-size:0.8rem; color:var(--muted);" id="welcome-msg"></div>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost btn-sm" id="btn-logout" title="Déconnexion">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <!-- Saisie Budget + Dépense -->
    <div class="card fade-in">
        <div class="two-col">
            <!-- Budget -->
            <div>
                <div class="card-title"><i class="fas fa-wallet"></i> Budget</div>
                <div class="field">
                    <label>Montant du budget (FCFA)</label>
                    <input type="number" id="total-amount" placeholder="Ex: 500000" min="0">
                </div>
                <button class="btn btn-primary" id="total-amount-button">
                    <i class="fas fa-check"></i> Fixer le budget
                </button>
            </div>
            <!-- Dépense -->
            <div>
                <div class="card-title"><i class="fas fa-minus-circle"></i> Dépense</div>
                <div class="field">
                    <label>Désignation</label>
                    <input type="text" id="product-title" placeholder="Ex: Loyer" list="titles-history">
                    <datalist id="titles-history"></datalist>
                </div>
                <div class="field">
                    <label>Catégorie</label>
                    <select id="expense-category">
                        <option value="🏠 Logement">🏠 Logement</option>
                        <option value="🍽️ Alimentation">🍽️ Alimentation</option>
                        <option value="🚗 Transport">🚗 Transport</option>
                        <option value="💊 Santé">💊 Santé</option>
                        <option value="🎓 Éducation">🎓 Éducation</option>
                        <option value="🎉 Loisirs">🎉 Loisirs</option>
                        <option value="👗 Habillement">👗 Habillement</option>
                        <option value="📱 Télécoms">📱 Télécoms</option>
                        <option value="🔧 Réparations">🔧 Réparations</option>
                        <option value="📦 Divers" selected>📦 Divers</option>
                    </select>
                </div>
                <div class="field">
                    <label>Montant (FCFA)</label>
                    <input type="number" id="user-amount" placeholder="Ex: 15000" min="0">
                </div>
                <button class="btn btn-primary" id="check-amount">
                    <i class="fas fa-plus"></i> Ajouter la dépense
                </button>
            </div>
        </div>

        <!-- Statistiques -->
        <div class="stats-row" style="margin-top:20px;">
            <div class="stat-card">
                <div class="stat-label">Budget</div>
                <div class="stat-value" id="amount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Dépensé</div>
                <div class="stat-value warning" id="expenditure-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Solde</div>
                <div class="stat-value positive" id="balance-amount">0</div>
            </div>
        </div>

        <!-- Barre de progression -->
        <div class="progress-wrap">
            <div class="progress-label">
                <span>Consommation du budget</span>
                <span id="progress-pct">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- Historique -->
    <div class="card fade-in">
        <div class="card-title"><i class="fas fa-list"></i> Historique des dépenses</div>

        <!-- Filtres -->
        <div class="filter-bar">
            <input type="text" id="search-input" placeholder="🔍 Rechercher...">
            <select id="filter-category">
                <option value="">Toutes catégories</option>
                <option value="🏠 Logement">🏠 Logement</option>
                <option value="🍽️ Alimentation">🍽️ Alimentation</option>
                <option value="🚗 Transport">🚗 Transport</option>
                <option value="💊 Santé">💊 Santé</option>
                <option value="🎓 Éducation">🎓 Éducation</option>
                <option value="🎉 Loisirs">🎉 Loisirs</option>
                <option value="👗 Habillement">👗 Habillement</option>
                <option value="📱 Télécoms">📱 Télécoms</option>
                <option value="🔧 Réparations">🔧 Réparations</option>
                <option value="📦 Divers">📦 Divers</option>
            </select>
        </div>

        <div id="list">
            <div class="empty-state">
                <i class="fas fa-receipt"></i>
                Aucune dépense enregistrée.<br>Commencez à saisir vos dépenses ci-dessus.
            </div>
        </div>

        <!-- Graphique -->
        <canvas id="expenseChart"></canvas>

        <!-- Tabs graphique -->
        <div class="tabs" style="margin-top:16px; margin-bottom:0;">
            <button class="tab active" data-type="bar">Barres</button>
            <button class="tab" data-type="pie">Camembert</button>
            <button class="tab" data-type="doughnut">Anneau</button>
        </div>

        <!-- Exports -->
        <div class="export-row">
            <button id="download-pdf" class="btn btn-ghost">
                <i class="fas fa-file-pdf"></i> Rapport PDF
            </button>
            <button id="download-excel" class="btn btn-success">
                <i class="fas fa-file-excel"></i> Excel
            </button>
            <button id="reset-all" class="btn btn-danger">
                <i class="fas fa-trash-alt"></i> Réinitialiser
            </button>
        </div>
    </div>
</div>

<div id="qrcode-hidden" style="display:none;"></div>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
