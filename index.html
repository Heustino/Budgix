<!DOCTYPE html>
<html lang="fr">
<head>

  <!-- Encodage -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NACC Smart Budget</title>

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
<style>
  .dark-mode {
  background-color: #121212;
  color: white;
}
</style>
</head>

<body>

  <!-- Bouton Mode Sombre -->
  <button id="toggle-dark" class="toggle-btn">
  🌙
</button>

  <div class="wrapper">

    <div class="container">
      <div class="sub-container">

        <!-- SECTION BUDGET -->
        <div class="total-amount-container">
          <h3>Budget</h3>
          <p class="hide error" id="budget-error">
            La valeur ne peut être ni vide ni négative
          </p>

          <input type="number" id="total-amount"
            placeholder="Entrez le montant total" />

          <button class="submit" id="total-amount-button">
            Établir le Budget
          </button>
        </div>

        <!-- SECTION DEPENSES -->
        <div class="user-amount-container">
          <h3>Dépenses</h3>

          <p class="hide error" id="product-title-error">
            Les valeurs ne peuvent pas être vides
          </p>

          <input type="text" id="product-title"
            placeholder="Entrez la désignation" />

          <input type="number" id="user-amount"
            placeholder="Entrez le montant" />

          <button class="submit" id="check-amount">
            Ajouter la dépense
          </button>
        </div>

      </div>

      <!-- AFFICHAGE RESULTATS -->
      <div class="output-container flex-space">
        <div>
          <p>Total Budget</p>
          <span id="amount">0</span>
        </div>

        <div>
          <p>Dépenses</p>
          <span id="expenditure-value">0</span>
        </div>

        <div>
          <p>Reste</p>
          <span id="balance-amount">0</span>
        </div>
      </div>
    </div>

    <!-- LISTE DES DEPENSES -->
    <div class="list">
      <h3>Liste des Dépenses</h3>

      <div class="list-container" id="list"></div>

      <!-- Graphique -->
      <canvas id="expenseChart" style="margin-top:40px;"></canvas>

      <!-- Boutons export -->
      <button id="download-pdf" class="submit" style="margin-top:20px;">
        Télécharger en PDF
      </button>

      <button id="download-excel" class="submit" style="margin-top:10px;">
        Télécharger en Excel
      </button>
    </div>

  </div>

  <!-- ================= LIBRAIRIES ================= -->

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- AutoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- XLSX (Excel Export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- TON SCRIPT PRINCIPAL -->
  <script src="script.js"></script>

</body>
</html>
